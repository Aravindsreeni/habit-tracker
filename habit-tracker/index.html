<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="site-title">Habit Tracker</div>
  <div id="hdr" class="site-sub"></div>
</header>

<nav>
  <button class="tab" onclick="sw('daily')">Daily</button>
  <button class="tab" onclick="sw('weekly')">Weekly</button>
  <button class="tab" onclick="sw('monthly')">Monthly</button>
  <button class="tab on" onclick="sw('wins')">Quick Wins</button>
</nav>

<!-- DAILY -->
<div class="pnl" id="p-daily">
  <div class="sec-hdr">
    <span class="sec-lbl">Today</span>
    <button class="sec-add" onclick="showAddForm('daily')">+ Add habit</button>
  </div>
  <div class="ahfrm" id="af-daily">
    <div class="frow">
      <input class="fi" id="fn-daily" type="text" placeholder="Habit name">
      <select class="fse" id="ft-daily" onchange="toggleMaxField()">
        <option value="c">Checkbox</option>
        <option value="w">Counter</option>
      </select>
      <input class="fnum" id="fm-daily" type="number" min="1" max="100" value="8" style="display:none" placeholder="Max">
    </div>
    <div class="fact">
      <button class="fcx" onclick="closeAddForm('daily')">Cancel</button>
      <button class="fsv" onclick="addHabit('daily')">Add</button>
    </div>
  </div>
  <div id="dl"></div>
</div>

<!-- WEEKLY -->
<div class="pnl" id="p-weekly">
  <div id="wsum" class="sm"></div>
  <div class="sec-hdr">
    <span class="sec-lbl" id="wlbl"></span>
    <button class="sec-add" onclick="showAddForm('weekly')">+ Add habit</button>
  </div>
  <div class="ahfrm" id="af-weekly">
    <div class="frow">
      <input class="fi" id="fn-weekly" type="text" placeholder="Habit name">
      <input class="fnum" id="ft-weekly" type="number" min="1" max="7" value="3" placeholder="Days / week">
    </div>
    <div class="fact">
      <button class="fcx" onclick="closeAddForm('weekly')">Cancel</button>
      <button class="fsv" onclick="addHabit('weekly')">Add</button>
    </div>
  </div>
  <div id="wl"></div>
</div>

<!-- MONTHLY -->
<div class="pnl" id="p-monthly">
  <div id="msum" class="sm"></div>
  <div class="sec-hdr">
    <span class="sec-lbl" id="mlbl"></span>
    <button class="sec-add" onclick="showAddForm('monthly')">+ Add habit</button>
  </div>
  <div class="ahfrm" id="af-monthly">
    <div class="frow">
      <input class="fi" id="fn-monthly" type="text" placeholder="Habit name">
      <input class="fnum" id="ft-monthly" type="number" min="1" max="31" value="7" placeholder="Days / month">
    </div>
    <div class="fact">
      <button class="fcx" onclick="closeAddForm('monthly')">Cancel</button>
      <button class="fsv" onclick="addHabit('monthly')">Add</button>
    </div>
  </div>
  <div id="ml"></div>
</div>

<!-- QUICK WINS -->
<div class="pnl on" id="p-wins">
  <div class="qbar">
    <div class="fg">
      <button class="fb on" onclick="sf('all')">All</button>
      <button class="fb" onclick="sf('pending')">Pending</button>
      <button class="fb" onclick="sf('done')">Done</button>
    </div>
    <button class="addb" onclick="tf()">+ Add task</button>
  </div>
  <div class="qfrm" id="qaf">
    <div class="frow">
      <input class="fi" id="qfn" type="text" placeholder="What needs to be done?">
      <select class="fse" id="qfe">
        <option value="5">5 min</option>
        <option value="10">10 min</option>
        <option value="30">30 min</option>
      </select>
    </div>
    <div class="fact">
      <button class="fcx" onclick="tf()">Cancel</button>
      <button class="fsv" onclick="da()">Add</button>
    </div>
  </div>
  <div id="ql"></div>
</div>

<!-- SYNC -->
<div class="syncsec">
  <div class="sync-row">
    <button class="syncbtn" id="syncbtn" onclick="syncTrigger()">↑ Sync to Drive</button>
    <button class="syncbtn" id="loadbtn" onclick="loadTrigger()">↓ Load from Drive</button>
  </div>
  <div class="syncinfo" id="syncinfo">Sync to Google Drive to access your habits from any device.</div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
<script src="https://accounts.google.com/gsi/client" async onload="gisLoaded()"></script>
</body>
</html>
